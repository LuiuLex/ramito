<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🌻</title>

<style>
body{
  margin:0;
  background:#e9dfd2;
  overflow:hidden;
}

/* Girasol botón */
#btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:120px;
  cursor:pointer;
  transition:0.5s;
}

/* canvas animación */
canvas{
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<img id="btn" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13406.png">

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let started = false;

document.getElementById("btn").onclick = () => {
  started = true;
  document.getElementById("btn").style.opacity = 0;
  growTree();
};

let branches = [];

function growTree(){
  let x = canvas.width/2;
  let y = canvas.height;

  branches.push({x,y,len:0,angle:-Math.PI/2});

  let interval = setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);

    branches.forEach(b=>{
      let nx = b.x + Math.cos(b.angle)*b.len;
      let ny = b.y + Math.sin(b.angle)*b.len;

      ctx.beginPath();
      ctx.moveTo(b.x,b.y);
      ctx.lineTo(nx,ny);
      ctx.strokeStyle="green";
      ctx.lineWidth=2;
      ctx.stroke();

      b.len += 2;

      if(b.len>80 && Math.random()<0.05){
        branches.push({
          x:nx,
          y:ny,
          len:0,
          angle:b.angle + (Math.random()*0.8-0.4)
        });
      }
    });

    if(branches.length>80){
      clearInterval(interval);
      drawHeart();
    }

  },30);
}

function drawFlower(x,y){
  let img = new Image();
  img.src = "https://pngimg.com/uploads/sunflower/sunflower_PNG13406.png";
  img.onload = ()=>{
    ctx.drawImage(img,x-15,y-15,30,30);
  };
}

function drawHeart(){
  let t = 0;

  let interval = setInterval(()=>{
    t += 0.2;

    let x = 16*Math.pow(Math.sin(t),3);
    let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let px = canvas.width/2 + x*10;
    let py = canvas.height/2 + y*10;

    drawFlower(px,py);

    if(t >= Math.PI*2){
      clearInterval(interval);
      moveTree();
    }

  },50);
}

function moveTree(){
  let offset = 0;

  let interval = setInterval(()=>{
    offset += 5;
    canvas.style.transform = `translateX(${offset}px)`;

    if(offset>200){
      clearInterval(interval);
      showText();
    }

  },20);
}

function showText(){
  let div = document.createElement("div");
  div.innerHTML = "Para ti 💛";
  div.style.position="absolute";
  div.style.left="10%";
  div.style.top="40%";
  div.style.fontSize="28px";

  document.body.appendChild(div);
}
</script>

</body>
</html>
