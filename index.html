<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🌻</title>

<style>
body{
  margin:0;
  background:#e9dfd2;
  overflow:hidden;
  font-family:Arial;
}

/* BOTÓN GIRASOL */
#sunflower{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:120px;
  cursor:pointer;
  z-index:10; /* 👈 importante */
}

/* CANVAS */
canvas{
  position:absolute;
  top:0;
  left:0;
  pointer-events:none; /* 👈 CLAVE: deja pasar el click */
}

  flores{
    position: absolute;
    width: 90%;
    font-size: 2rem;
    font-family: "te amo";
    heigh: var(--letter-love);
    transform: translateX(-50%);
    background: var(--letter);
  }

/* TEXTO */
#text, #clock{
  position:absolute;
  left:10%;
  opacity:0;
  transition:2s;
  z-index:5;
}

#text{ top:40%; font-size:28px; }
#clock{ top:50%; font-size:22px; }
</style>
</head>

<body>

<img id="sunflower"
src="https://pngimg.com/uploads/sunflower/sunflower_PNG13406.png">

<canvas id="c"></canvas>

<div id="text">Para ti 💛</div>
<div id="clock"></div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let started = false;

/* CLICK (AHORA SÍ FUNCIONA) */
document.getElementById("sunflower").addEventListener("click", () => {
  if(started) return;
  started = true;

  document.getElementById("sunflower").style.opacity = 0;
  dropSeed();
});

/* SEMILLA */
function dropSeed(){
  let y = innerHeight/2;

  let interval = setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.beginPath();
    ctx.arc(innerWidth/2,y,6,0,Math.PI*2);
    ctx.fillStyle="brown";
    ctx.fill();

    y+=5;

    if(y >= innerHeight-20){
      clearInterval(interval);
      growTree();
    }

  },16);
}

/* ÁRBOL */
let branches = [];

function growTree(){
  branches.push({
    x:innerWidth/2,
    y:innerHeight,
    len:0,
    angle:-Math.PI/2,
    depth:0
  });

  let interval = setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);

    branches.forEach(b=>{
      let nx = b.x + Math.cos(b.angle)*b.len;
      let ny = b.y + Math.sin(b.angle)*b.len;

      ctx.beginPath();
      ctx.moveTo(b.x,b.y);
      ctx.lineTo(nx,ny);
      ctx.strokeStyle="#2e7d32";
      ctx.lineWidth=2;
      ctx.stroke();

      b.len += 1.5;

      if(b.len > 50 && b.depth < 4 && Math.random()<0.02){
        branches.push({
          x:nx,
          y:ny,
          len:0,
          angle:b.angle + (Math.random()*0.8-0.4),
          depth:b.depth+1
        });
      }
    });

    if(branches.length > 120){
      clearInterval(interval);
      growHeart();
    }

  },16);
}

/* CORAZÓN */
function growHeart(){
  let t = 0;
  let img = new Image();
  img.src = "https://pngimg.com/uploads/sunflower/sunflower_PNG13406.png";

  let interval = setInterval(()=>{
    t += 0.1;

    let x = 16*Math.pow(Math.sin(t),3);
    let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let px = innerWidth/2 + x*12;
    let py = innerHeight/2 + y*12;

    ctx.drawImage(img,px-15,py-15,30,30);

    if(t >= Math.PI*2){
      clearInterval(interval);
      moveScene();
    }

  },30);
}

/* MOVER */
function moveScene(){
  let offset = 0;

  let interval = setInterval(()=>{
    offset += 3;
    canvas.style.transform = `translateX(${offset}px)`;

    if(offset > 250){
      clearInterval(interval);
      showText();
    }

  },16);
}

/* TEXTO + RELOJ */
function showText(){
  document.getElementById("text").style.opacity = 1;
  document.getElementById("clock").style.opacity = 1;

  setInterval(()=>{
    let now = new Date();
    document.getElementById("clock").innerText =
      now.toLocaleTimeString();
  },1000);
}
</script>

</body>
</html>
