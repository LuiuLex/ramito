<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ramo de Links 💐</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* fondo rosado pastel */
  background: 
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.3) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.2) 0%, transparent 40%),
    linear-gradient(#f8d7da, #f3c6cc);
}

/* CONTENEDOR */
.bouquet {
  position: relative;
  width: 600px; /* MÁS GRANDE */
}

/* IMAGEN RAMO */
.bouquet img.main {
  width: 100%;
  filter: drop-shadow(0 15px 30px rgba(0,0,0,0.25));
}

/* IMÁGENES SOBRE FLORES */
.flower-img {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;
  transition: 0.3s;
  border: 3px solid white;
}

.flower-img:hover {
  transform: scale(1.2);
  box-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
}

/* POSICIONES */
.f1 { top: 60px; left: 200px; }
.f2 { top: 120px; left: 100px; }
.f3 { top: 120px; right: 100px; }
.f4 { top: 200px; left: 220px; }
.f5 { top: 230px; right: 180px; }
.f6 { top: 260px; left: 150px; }

</style>
</head>
<body>

<div class="bouquet">

  <!-- RAMO -->
  <img src="ramo.png" class="main">

  <!-- IMÁGENES CLICKEABLES -->
  <a href="https://open.spotify.com" target="_blank">
    <img src="https://picsum.photos/100?1" class="flower-img f1">
  </a>

  <a href="https://youtube.com" target="_blank">
    <img src="https://picsum.photos/100?2" class="flower-img f2">
  </a>

  <a href="https://drive.google.com" target="_blank">
    <img src="https://picsum.photos/100?3" class="flower-img f3">
  </a>

  <a href="https://instagram.com" target="_blank">
    <img src="https://picsum.photos/100?4" class="flower-img f4">
  </a>

  <a href="https://example.com" target="_blank">
    <img src="https://picsum.photos/100?5" class="flower-img f5">
  </a>

  <a href="https://example.com" target="_blank">
    <img src="https://picsum.photos/100?6" class="flower-img f6">
  </a>

</div>

</body>
</html>
