<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ramo de Links</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#ffe6eb, #fff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
}

.bouquet {
  position: relative;
  width: 300px;
  height: 400px;
}

/* Tallos */
.stem {
  position: absolute;
  width: 6px;
  height: 150px;
  background: green;
  bottom: 0;
  left: 50%;
  transform-origin: bottom;
}

/* Flor */
.flower {
  position: absolute;
  width: 60px;
  height: 60px;
  background: pink;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

.flower:hover {
  transform: scale(1.2);
}

/* posiciones */
.f1 { top: 40px; left: 120px; background:#ff4d6d; }
.f2 { top: 80px; left: 60px; background:#ffb703; }
.f3 { top: 80px; left: 180px; background:#8338ec; }
.f4 { top: 140px; left: 100px; background:#219ebc; }

/* hoja */
.leaf {
  position: absolute;
  width: 40px;
  height: 20px;
  background: green;
  border-radius: 20px;
}

.l1 { bottom: 100px; left: 110px; transform: rotate(-30deg); }
.l2 { bottom: 120px; left: 140px; transform: rotate(30deg); }

</style>
</head>
<body>

<div class="bouquet">

  <!-- flores con links -->
  <a href="https://open.spotify.com" target="_blank">
    <div class="flower f1"></div>
  </a>

  <a href="https://youtube.com" target="_blank">
    <div class="flower f2"></div>
  </a>

  <a href="https://drive.google.com" target="_blank">
    <div class="flower f3"></div>
  </a>

  <a href="https://instagram.com" target="_blank">
    <div class="flower f4"></div>
  </a>

  <!-- tallos -->
  <div class="stem" style="transform: rotate(-10deg);"></div>
  <div class="stem" style="transform: rotate(10deg);"></div>
  <div class="stem" style="transform: rotate(-25deg);"></div>
  <div class="stem" style="transform: rotate(25deg);"></div>

  <!-- hojas -->
  <div class="leaf l1"></div>
  <div class="leaf l2"></div>

</div>

</body>
</html>
