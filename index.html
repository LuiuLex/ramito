<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ramo de Links 💐</title>

<style>
body {
  margin: 0;
  background: #f3e5e5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR DEL RAMO */
.bouquet {
  position: relative;
  width: 420px;
}

/* IMAGEN */
.bouquet img {
  width: 100%;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* LINKS (zonas invisibles) */
.link {
  position: absolute;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

/* efecto hover */
.link:hover {
  background: rgba(255, 0, 100, 0.25);
  transform: scale(1.1);
}

/* POSICIONES (ajústalas si hace falta) */
.l1 { top: 60px; left: 140px; }
.l2 { top: 80px; right: 120px; }
.l3 { top: 120px; left: 70px; }
.l4 { top: 140px; right: 70px; }
.l5 { top: 110px; left: 200px; }
.l6 { top: 160px; left: 150px; }

</style>
</head>
<body>

<div class="bouquet">

  <!-- TU IMAGEN -->
  <img src="ramo.jpeg" alt="ramo de rosas">

  <!-- LINKS SOBRE LAS FLORES -->
  <a href="https://open.spotify.com" target="_blank" class="link l1"></a>
  <a href="https://youtube.com" target="_blank" class="link l2"></a>
  <a href="https://drive.google.com" target="_blank" class="link l3"></a>
  <a href="https://instagram.com" target="_blank" class="link l4"></a>
  <a href="https://example.com" target="_blank" class="link l5"></a>
  <a href="https://example.com" target="_blank" class="link l6"></a>

</div>

</body>
</html>
