<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🌻 Para ti</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: #e6d8c9;
  font-family: Arial, sans-serif;
}

/* Girasol inicial */
#sunflower {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 120px;
  cursor: pointer;
  transition: opacity 1s;
}

/* Semilla */
.seed {
  position: absolute;
  width: 15px;
  height: 15px;
  background: brown;
  border-radius: 50%;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  animation: fall 1s forwards;
}

@keyframes fall {
  to {
    top: 80%;
  }
}

/* Árbol */
#tree {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 10px;
  height: 0;
  background: green;
  transition: height 2s;
}

/* Corazón de girasoles */
.flower {
  position: absolute;
  width: 30px;
  height: 30px;
  background: url('https://pngimg.com/uploads/sunflower/sunflower_PNG13406.png') no-repeat center/contain;
}

/* Texto */
#text {
  position: absolute;
  left: 10%;
  top: 40%;
  font-size: 24px;
  opacity: 0;
  transition: opacity 2s;
}

/* Reloj */
#clock {
  position: absolute;
  left: 10%;
  top: 50%;
  font-size: 20px;
  opacity: 0;
  transition: opacity 2s;
}
</style>
</head>

<body>

<img id="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13406.png">

<div id="tree"></div>
<div id="text">Para ti 💛</div>
<div id="clock"></div>

<script>
const sunflower = document.getElementById("sunflower");
const tree = document.getElementById("tree");
const text = document.getElementById("text");
const clock = document.getElementById("clock");

sunflower.onclick = () => {

  // Ocultar girasol
  sunflower.style.opacity = "0";

  // Crear semilla
  let seed = document.createElement("div");
  seed.className = "seed";
  document.body.appendChild(seed);

  setTimeout(() => {
    seed.remove();

    // Crecer árbol
    tree.style.height = "300px";

    setTimeout(() => {
      createHeart();

      setTimeout(() => {
        // mover árbol a la derecha
        tree.style.left = "70%";

        // mostrar texto
        text.style.opacity = "1";
        clock.style.opacity = "1";

        startClock();

      }, 2000);

    }, 2000);

  }, 1000);
};

// Crear corazón con flores
function createHeart() {
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;

  for (let t = 0; t < Math.PI * 2; t += 0.2) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t) - Math.cos(4*t));

    let flower = document.createElement("div");
    flower.className = "flower";

    flower.style.left = (centerX + x * 10) + "px";
    flower.style.top = (centerY + y * 10) + "px";

    document.body.appendChild(flower);
  }
}

// Reloj
function startClock() {
  setInterval(() => {
    let now = new Date();
    clock.innerText = now.toLocaleTimeString();
  }, 1000);
}
</script>

</body>
</html>
