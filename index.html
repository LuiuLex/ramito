<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ramo de Links 💐</title>

<style>
body {
  margin: 0;
  background: #000; /* negro para que combine con tu imagen */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR */
.bouquet {
  position: relative;
  width: 450px;
}

/* IMAGEN */
.bouquet img {
  width: 100%;
}

/* LINKS (zonas de flores) */
.link {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

/* efecto hover */
.link:hover {
  background: rgba(255, 0, 100, 0.3);
  transform: scale(1.1);
}

/* POSICIONES (ajustadas a tu imagen) */
.l1 { top: 40px; left: 160px; }   /* flor blanca arriba */
.l2 { top: 80px; left: 80px; }    /* flor roja */
.l3 { top: 80px; right: 80px; }   /* flor amarilla */
.l4 { top: 140px; left: 140px; }  /* flor rosada centro */
.l5 { top: 160px; right: 120px; } /* flor rosada pequeña */
.l6 { top: 180px; left: 100px; }  /* flor blanca abajo */

</style>
</head>
<body>

<div class="bouquet">

  <!-- TU IMAGEN -->
  <img src="ramo.png" alt="ramo">

  <!-- LINKS -->
  <a href="https://open.spotify.com" target="_blank" class="link l1"></a>
  <a href="https://youtube.com" target="_blank" class="link l2"></a>
  <a href="https://drive.google.com" target="_blank" class="link l3"></a>
  <a href="https://instagram.com" target="_blank" class="link l4"></a>
  <a href="https://example.com" target="_blank" class="link l5"></a>
  <a href="https://example.com" target="_blank" class="link l6"></a>

</div>

</body>
</html>
