<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🌻</title>

<style>
body{
  margin:0;
  background:#e9dfd2;
  overflow:hidden;
  font-family:Arial;
}

/* BOTÓN GIRASOL */
#sunflower{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:130px;
  cursor:pointer;
  transition:0.5s;
}

/* SEMILLA */
.seed{
  position:absolute;
  width:12px;
  height:12px;
  background:#5c3d2e;
  border-radius:50%;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  animation:fall 1s forwards;
}

@keyframes fall{
  to{
    top:80%;
  }
}

/* ÁRBOL */
#tree{
  position:absolute;
  bottom:0;
  left:50%;
  width:6px;
  height:0;
  background:#2e7d32;
  transform:translateX(-50%);
  transition:height 2s;
}

/* RAMAS */
.branch{
  position:absolute;
  width:4px;
  height:80px;
  background:#2e7d32;
  transform-origin:bottom;
}

/* FLORES */
.flower{
  position:absolute;
  width:35px;
  height:35px;
  background:url('https://pngimg.com/uploads/sunflower/sunflower_PNG13406.png') center/contain no-repeat;
}

/* TEXTO */
#text{
  position:absolute;
  left:10%;
  top:40%;
  font-size:28px;
  opacity:0;
  transition:1.5s;
}

/* RELOJ */
#clock{
  position:absolute;
  left:10%;
  top:50%;
  font-size:22px;
  opacity:0;
  transition:1.5s;
}
</style>
</head>

<body>

<img id="sunflower" src="https://pngimg.com/uploads/sunflower/sunflower_PNG13406.png">

<div id="tree"></div>
<div id="text">Para ti 💛</div>
<div id="clock"></div>

<script>
const sunflower = document.getElementById("sunflower");
const tree = document.getElementById("tree");

sunflower.addEventListener("click", startAnimation);

function startAnimation(){

  sunflower.style.opacity = "0";

  // SEMILLA
  let seed = document.createElement("div");
  seed.className = "seed";
  document.body.appendChild(seed);

  setTimeout(()=>{
    seed.remove();

    // CRECER TRONCO
    tree.style.height = "250px";

    setTimeout(()=>{
      createBranches();
      createHeart();

      setTimeout(()=>{
        moveTree();
        showText();
      },2000);

    },2000);

  },1000);
}

/* RAMAS */
function createBranches(){
  for(let i=0;i<5;i++){
    let branch = document.createElement("div");
    branch.className = "branch";

    branch.style.bottom = (100 + i*30) + "px";
    branch.style.left = "50%";
    branch.style.transform = `rotate(${i%2==0 ? -30 : 30}deg)`;

    document.body.appendChild(branch);
  }
}

/* CORAZÓN */
function createHeart(){
  const centerX = window.innerWidth/2;
  const centerY = window.innerHeight/2;

  for(let t=0;t<Math.PI*2;t+=0.2){
    let x = 16*Math.pow(Math.sin(t),3);
    let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let flower = document.createElement("div");
    flower.className = "flower";

    flower.style.left = (centerX + x*10) + "px";
    flower.style.top = (centerY + y*10) + "px";

    document.body.appendChild(flower);
  }
}

/* MOVER */
function moveTree(){
  tree.style.left = "70%";

  let branches = document.querySelectorAll(".branch");
  branches.forEach(b=>{
    b.style.left = "70%";
  });
}

/* TEXTO + RELOJ */
function showText(){
  const text = document.getElementById("text");
  const clock = document.getElementById("clock");

  text.style.opacity = "1";
  clock.style.opacity = "1";

  setInterval(()=>{
    let now = new Date();
    clock.innerText = now.toLocaleTimeString();
  },1000);
}
</script>

</body>
</html>
