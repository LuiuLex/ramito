<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ramo de Links</title>

<style>
body {
  margin: 0;
  background: #f3e5e5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR */
.bouquet {
  position: relative;
  width: 400px;
}

/* IMAGEN DEL RAMO */
.bouquet img {
  width: 100%;
  border-radius: 10px;
}

/* ZONAS CLICK (flores invisibles) */
.link {
  position: absolute;
  width: 60px;
  height: 60px;
  cursor: pointer;
  border-radius: 50%;
}

/* POSICIONES (ajústalas si quieres) */
.l1 { top: 60px; left: 120px; }
.l2 { top: 80px; right: 100px; }
.l3 { top: 120px; left: 60px; }
.l4 { top: 140px; right: 60px; }
.l5 { top: 100px; left: 180px; }

.link:hover {
  background: rgba(255, 0, 100, 0.2);
}

</style>
</head>
<body>

<div class="bouquet">

  <!-- IMAGEN DEL RAMO -->
  <img src="https://i.imgur.com/0Z8FQyR.jpg" alt="ramo de rosas">

  <!-- LINKS SOBRE LAS ROSAS -->
  <a href="https://open.spotify.com" class="link l1" target="_blank"></a>
  <a href="https://youtube.com" class="link l2" target="_blank"></a>
  <a href="https://drive.google.com" class="link l3" target="_blank"></a>
  <a href="https://instagram.com" class="link l4" target="_blank"></a>
  <a href="https://example.com" class="link l5" target="_blank"></a>

</div>

</body>
</html>
